  /finance/settlements/generate:
    post:
      tags: [Finance]
      summary: Generate monthly driver settlements
      operationId: generateMonthlySettlement
      x-roles: [Admin, Finance]
      x-business-rules:
        - Monthly settlement aggregates attendance, mission execution, calculated costs, penalties, and extra payments.
        - Once settlement is finalized, financial records must not be modified.
        - Settlement generation should be idempotent for same year/month unless regeneration is explicitly allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSettlementRequest'
      responses:
        '201':
          description: Settlement generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementListResponseEnvelope'
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /finance/settlements/{settlementId}:
    get:
      tags: [Finance]
      summary: Get settlement by id
      operationId: getSettlementById
      x-roles: [Admin, Finance]
      parameters:
        - $ref: '#/components/parameters/SettlementId'
      responses:
        '200':
          description: Settlement details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }

  /finance/settlements/{settlementId}/finalize:
    post:
      tags: [Finance]
      summary: Finalize settlement and make it immutable
      operationId: finalizeSettlement
      x-roles: [Admin, Finance]
      x-business-rules:
        - Finalized settlements are immutable.
        - Related mission costs must be locked after finalization.
      parameters:
        - $ref: '#/components/parameters/SettlementId'
      responses:
        '200':
          description: Settlement finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /finance/calculation-policies:
    get:
      tags: [Finance, Lookups]
      summary: Get calculation policies
      operationId: getCalculationPolicies
      x-roles: [Admin, Finance]
      x-rfb-status: TODO_OTHER_ORGANIZATIONS
      x-todo:
        - Complete calculation rules for other organizations when RFB is completed.
      responses:
        '200':
          description: Calculation policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationPolicyListResponseEnvelope'
    post:
      tags: [Finance, Lookups]
      summary: Create calculation policy placeholder
      operationId: createCalculationPolicy
      x-roles: [Admin, Finance]
      x-rfb-status: TODO_OTHER_ORGANIZATIONS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCalculationPolicyRequest'
      responses:
        '201':
          description: Calculation policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculationPolicyResponseEnvelope'
        '422': { $ref: '#/components/responses/ValidationError' }

  /reports/missions:
    get:
      tags: [Reports]
      summary: Mission report
      operationId: getMissionReport
      x-roles: [Admin, Manager, Dispatcher, Finance]
      parameters:
        - name: fromDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: toDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/MissionStatus'
      responses:
        '200':
          description: Mission report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponseEnvelope'

  /reports/drivers:
    get:
      tags: [Reports]
      summary: Driver performance report
      operationId: getDriverReport
      x-roles: [Admin, Manager, Dispatcher, Finance]
      parameters:
        - name: driverId
          in: query
          schema: { type: integer, nullable: true }
        - name: fromDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: toDate
          in: query
          schema: { type: string, format: date, nullable: true }
      responses:
        '200':
          description: Driver report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponseEnvelope'

  /reports/vehicles:
    get:
      tags: [Reports]
      summary: Vehicle usage report
      operationId: getVehicleReport
      x-roles: [Admin, Manager, Dispatcher, Finance]
      parameters:
        - name: vehicleId
          in: query
          schema: { type: integer, nullable: true }
        - name: fromDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: toDate
          in: query
          schema: { type: string, format: date, nullable: true }
      responses:
        '200':
          description: Vehicle report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponseEnvelope'

  /reports/costs:
    get:
      tags: [Reports]
      summary: Cost analysis report
      operationId: getCostReport
      x-roles: [Admin, Manager, Finance]
      parameters:
        - name: fromDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: toDate
          in: query
          schema: { type: string, format: date, nullable: true }
        - name: driverId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: Cost report data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponseEnvelope'

  /audit-logs:
    get:
      tags: [Audit]
      summary: Search audit logs
      operationId: searchAuditLogs
      x-roles: [Admin]
      x-business-rules:
        - All critical operations must be auditable.
        - Audit logs must include actor, action, entity, timestamp, and before/after values where applicable.
      parameters:
        - name: entityName
          in: query
          schema: { type: string, nullable: true }
        - name: entityId
          in: query
          schema: { type: string, nullable: true }
        - name: actorUserId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponseEnvelope'

  /integrations/chargoon/org-chart/sync:
    post:
      tags: [Integrations]
      summary: Synchronize organization chart from Chargoon
      operationId: syncChargoonOrgChart
      x-roles: [Admin, ITOperator]
      x-rfb-status: TODO_EXTERNAL_INTEGRATION
      x-todo:
        - Clarify Chargoon API availability, authentication, data mapping, and sync frequency.
        - If Chargoon integration is not available in MVP, keep this endpoint disabled behind feature flag.
      responses:
        '202':
          description: Sync accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobAcceptedResponseEnvelope'
        '501':
          description: Not implemented until external integration is clarified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: integer }
    BranchId:
      name: branchId
      in: path
      required: true
      schema: { type: integer }
    ProvinceId:
      name: provinceId
      in: path
      required: true
      schema: { type: integer }
    CityId:
      name: cityId
      in: path
      required: true
      schema: { type: integer }
    DriverId:
      name: driverId
      in: path
      required: true
      schema: { type: integer }
    VehicleId:
      name: vehicleId
      in: path
      required: true
      schema: { type: integer }
    ContractId:
      name: contractId
      in: path
      required: true
      schema: { type: integer }
    MissionId:
      name: missionId
      in: path
      required: true
      schema: { type: integer }
    AttendanceId:
      name: attendanceId
      in: path
      required: true
      schema: { type: integer }
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: { type: integer }
    SettlementId:
      name: settlementId
      in: path
      required: true
      schema: { type: integer }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Business rule conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorResponse:
      type: object
      properties:
        isSuccess: { type: boolean, example: false }
        message: { type: string }
        data: { nullable: true }
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'

    ErrorItem:
      type: object
      properties:
        code: { type: string, example: MISSION_NOT_APPROVED }
        field: { type: string, nullable: true, example: missionId }
        message: { type: string }

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalItems: { type: integer }
        totalPages: { type: integer }

    MissionType:
      type: string
      enum: [Urban, Outbound, TODO_Other]
      description: TODO_Other must be clarified when incomplete RFB sections are completed.

    TravelType:
      type: string
      enum: [Ground, Air, TODO_Other]

    MissionStatus:
      type: string
      enum:
        - Draft
        - PendingApproval
        - Approved
        - Rejected
        - ReadyForDispatch
        - Assigned
        - InProgress
        - Completed
        - CostCalculated
        - PendingSettlement
        - Settled
        - Cancelled

    VehicleOwnershipType:
      type: string
      enum: [Personal, Organization]

    VehicleStatus:
      type: string
      enum: [Available, Assigned, InService, OutOfService, InsuranceExpired, Inactive]

    ContractStatus:
      type: string
      enum: [Draft, Active, Expired, Terminated]

    SettlementStatus:
      type: string
      enum: [Draft, Generated, Finalized, Cancelled]

    CalculationPolicyType:
      type: string
      enum:
        - UrbanHourly
        - UrbanKilometer
        - OutboundKilometerAndSleep
        - TODO_OrganizationSpecific

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: string, format: date-time }
        user:
          $ref: '#/components/schemas/UserDto'

    AuthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    SuccessEnvelope:
      type: object
      properties:
        isSuccess: { type: boolean, example: true }
        message: { type: string, nullable: true }
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'

    UserDto:
      type: object
      properties:
        id: { type: integer }
        branchId: { type: integer, nullable: true }
        organizationUnitId: { type: integer, nullable: true }
        firstName: { type: string }
        lastName: { type: string }
        nationalCode: { type: string, nullable: true }
        mobile: { type: string, nullable: true }
        personnelCode: { type: string, nullable: true }
        username: { type: string }
        roles:
          type: array
          items: { type: string }
        isActive: { type: boolean }

    CreateUserRequest:
      type: object
      required: [firstName, lastName, username]
      properties:
        branchId: { type: integer, nullable: true }
        organizationUnitId: { type: integer, nullable: true }
        firstName: { type: string, maxLength: 100 }
        lastName: { type: string, maxLength: 100 }
        nationalCode: { type: string, nullable: true, maxLength: 10 }
        mobile: { type: string, nullable: true }
        personnelCode: { type: string, nullable: true }
        username: { type: string }
        password: { type: string, nullable: true, description: Required if identity provider is local. }
        roleIds:
          type: array
          items: { type: integer }

    UpdateUserRequest:
      allOf:
        - $ref: '#/components/schemas/CreateUserRequest'

    AssignRolesRequest:
      type: object
      required: [roleIds]
      properties:
        roleIds:
          type: array
          items: { type: integer }

    RoleDto:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }

    BranchDto:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }
        address: { type: string, nullable: true }
        isActive: { type: boolean }

    CreateBranchRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        code: { type: string, nullable: true }
        address: { type: string, nullable: true }

    UpdateBranchRequest:
      allOf:
        - $ref: '#/components/schemas/CreateBranchRequest'
        - type: object
          properties:
            isActive: { type: boolean }

    OrganizationUnitDto:
      type: object
      properties:
        id: { type: integer }
        parentId: { type: integer, nullable: true }
        name: { type: string }
        code: { type: string, nullable: true }
        isActive: { type: boolean }

    CreateOrganizationUnitRequest:
      type: object
      required: [name]
      properties:
        parentId: { type: integer, nullable: true }
        name: { type: string }
        code: { type: string, nullable: true }

    ProvinceDto:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }
        isActive: { type: boolean }

    CreateProvinceRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        code: { type: string, nullable: true }

    UpdateProvinceRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProvinceRequest'
        - type: object
          properties:
            isActive: { type: boolean }

    CityDto:
      type: object
      properties:
        id: { type: integer }
        provinceId: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }
        isActive: { type: boolean }

    CreateCityRequest:
      type: object
      required: [provinceId, name]
      properties:
        provinceId: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }

    UpdateCityRequest:
      allOf:
        - $ref: '#/components/schemas/CreateCityRequest'
        - type: object
          properties:
            isActive: { type: boolean }

    DriverDto:
      type: object
      properties:
        id: { type: integer }
        branchId: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        fatherName: { type: string, nullable: true }
        nationalCode: { type: string }
        birthCertificateNo: { type: string, nullable: true }
        birthPlace: { type: string, nullable: true }
        birthDate: { type: string, format: date, nullable: true }
        mobile: { type: string, nullable: true }
        licenseNo: { type: string }
        insuranceExpireDate: { type: string, format: date, nullable: true }
        insuranceWarningEnabled: { type: boolean }
        isActive: { type: boolean }

    CreateDriverRequest:
      type: object
      required: [branchId, firstName, lastName, nationalCode, licenseNo]
      properties:
        branchId: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        fatherName: { type: string, nullable: true }
        nationalCode: { type: string, maxLength: 10 }
        birthCertificateNo: { type: string, nullable: true }
        birthPlace: { type: string, nullable: true }
        birthDate: { type: string, format: date, nullable: true }
        mobile: { type: string, nullable: true }
        licenseNo: { type: string }
        insuranceExpireDate: { type: string, format: date, nullable: true }
        insuranceWarningEnabled: { type: boolean, default: false }

    UpdateDriverRequest:
      allOf:
        - $ref: '#/components/schemas/CreateDriverRequest'
        - type: object
          properties:
            isActive: { type: boolean }

    VehicleDto:
      type: object
      properties:
        id: { type: integer }
        vehicleType: { type: string }
        model: { type: string, nullable: true }
        color: { type: string, nullable: true }
        chassisNo: { type: string }
        plateNo: { type: string }
        ownershipType:
          $ref: '#/components/schemas/VehicleOwnershipType'
        thirdPartyInsuranceExpireDate: { type: string, format: date }
        bodyInsuranceExpireDate: { type: string, format: date, nullable: true }
        status:
          $ref: '#/components/schemas/VehicleStatus'
        isActive: { type: boolean }

    CreateVehicleRequest:
      type: object
      required: [vehicleType, chassisNo, plateNo, ownershipType, thirdPartyInsuranceExpireDate]
      properties:
        vehicleType: { type: string }
        model: { type: string, nullable: true }
        color: { type: string, nullable: true }
        chassisNo: { type: string }
        plateNo: { type: string }
        ownershipType:
          $ref: '#/components/schemas/VehicleOwnershipType'
        thirdPartyInsuranceExpireDate: { type: string, format: date }
        bodyInsuranceExpireDate: { type: string, format: date, nullable: true }

    UpdateVehicleRequest:
      allOf:
        - $ref: '#/components/schemas/CreateVehicleRequest'
        - type: object
          properties:
            status:
              $ref: '#/components/schemas/VehicleStatus'
            isActive: { type: boolean }

    ContractDto:
      type: object
      properties:
        id: { type: integer }
        driverId: { type: integer }
        vehicleId: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        hourlyAmount: { type: number, format: decimal, nullable: true }
        goingAmount: { type: number, format: decimal, nullable: true }
        returningAmount: { type: number, format: decimal, nullable: true }
        sleepHourlyAmount: { type: number, format: decimal, nullable: true }
        kilometerAmount: { type: number, format: decimal, nullable: true }
        hasInsurance: { type: boolean, nullable: true, description: RFB says this field exists in old system but may not be used. }
        status:
          $ref: '#/components/schemas/ContractStatus'

    CreateContractRequest:
      type: object
      required: [driverId, vehicleId, startDate, endDate]
      properties:
        driverId: { type: integer }
        vehicleId: { type: integer }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        hourlyAmount: { type: number, format: decimal, nullable: true }
        goingAmount: { type: number, format: decimal, nullable: true }
        returningAmount: { type: number, format: decimal, nullable: true }
        sleepHourlyAmount: { type: number, format: decimal, nullable: true }
        kilometerAmount: { type: number, format: decimal, nullable: true }
        hasInsurance: { type: boolean, nullable: true }

    UpdateContractRequest:
      allOf:
        - $ref: '#/components/schemas/CreateContractRequest'
        - type: object
          properties:
            status:
              $ref: '#/components/schemas/ContractStatus'

    MissionDto:
      type: object
      properties:
        id: { type: integer }
        missionNo: { type: string }
        requesterUserId: { type: integer }
        originProvinceId: { type: integer }
        originCityId: { type: integer }
        destinationProvinceId: { type: integer }
        destinationCityId: { type: integer }
        startDateTime: { type: string, format: date-time }
        endDateTime: { type: string, format: date-time }
        missionType:
          $ref: '#/components/schemas/MissionType'
        travelType:
          $ref: '#/components/schemas/TravelType'
        originAddress: { type: string, nullable: true }
        destinationAddress: { type: string, nullable: true }
        reason: { type: string }
        description: { type: string, nullable: true }
        status:
          $ref: '#/components/schemas/MissionStatus'
        passengerUserIds:
          type: array
          items: { type: integer }

    CreateMissionRequest:
      type: object
      required:
        - requesterUserId
        - originProvinceId
        - originCityId
        - destinationProvinceId
        - destinationCityId
        - startDateTime
        - endDateTime
        - missionType
        - travelType
        - reason
      properties:
        requesterUserId: { type: integer }
        originProvinceId: { type: integer }
        originCityId: { type: integer }
        destinationProvinceId: { type: integer }
        destinationCityId: { type: integer }
        startDateTime: { type: string, format: date-time }
        endDateTime: { type: string, format: date-time }
        missionType:
          $ref: '#/components/schemas/MissionType'
        travelType:
          $ref: '#/components/schemas/TravelType'
        originAddress: { type: string, nullable: true }
        destinationAddress: { type: string, nullable: true }
        reason: { type: string }
        description: { type: string, nullable: true }
        passengerUserIds:
          type: array
          items: { type: integer }

    UpdateMissionRequest:
      allOf:
        - $ref: '#/components/schemas/CreateMissionRequest'

    ApprovalDecisionRequest:
      type: object
      properties:
        comment: { type: string, nullable: true }

    RejectMissionRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        comment: { type: string, nullable: true }

    AddMissionPassengersRequest:
      type: object
      required: [passengerUserIds]
      properties:
        passengerUserIds:
          type: array
          items: { type: integer }

    ApprovalHistoryItemDto:
      type: object
      properties:
        id: { type: integer }
        missionId: { type: integer }
        approverUserId: { type: integer }
        approvalOrder: { type: integer }
        approvalRole: { type: string, nullable: true }
        status: { type: string }
        comment: { type: string, nullable: true }
        actionDateTime: { type: string, format: date-time, nullable: true }

    DispatchResourcesDto:
      type: object
      properties:
        missionId: { type: integer }
        availableDrivers:
          type: array
          items: { $ref: '#/components/schemas/DriverDto' }
        availableVehicles:
          type: array
          items: { $ref: '#/components/schemas/VehicleDto' }
        activeContracts:
          type: array
          items: { $ref: '#/components/schemas/ContractDto' }
        warnings:
          type: array
          items: { type: string }

    AssignMissionResourcesRequest:
      type: object
      required: [missionId, driverId, vehicleId]
      properties:
        missionId: { type: integer }
        driverId: { type: integer }
        vehicleId: { type: integer }
        contractId: { type: integer, nullable: true }
        description: { type: string, nullable: true }

    ReassignMissionResourcesRequest:
      type: object
      required: [missionId, driverId, vehicleId, reason]
      properties:
        missionId: { type: integer }
        driverId: { type: integer }
        vehicleId: { type: integer }
        contractId: { type: integer, nullable: true }
        reason: { type: string }

    MissionAssignmentDto:
      type: object
      properties:
        id: { type: integer }
        missionId: { type: integer }
        driverId: { type: integer }
        vehicleId: { type: integer }
        contractId: { type: integer, nullable: true }
        assignedByUserId: { type: integer }
        assignedAt: { type: string, format: date-time }
        status: { type: string }
        description: { type: string, nullable: true }

    DriverAttendanceDto:
      type: object
      properties:
        id: { type: integer }
        driverId: { type: integer }
        vehicleId: { type: integer, nullable: true }
        attendanceDate: { type: string, format: date }
