openapi: 3.0.3
info:
  title: Transport & Mission Management System API
  version: 1.0.0
  description: |
    Enterprise API Contract for the Transportation and Mission Order Management System.
    This contract is designed for Codex implementation with ASP.NET Core, SQL Server, Clean Architecture, CQRS, and Swagger.

    Important implementation notes:
    - Sections marked with `x-rfb-status: TODO` represent incomplete or ambiguous RFB requirements and must be completed later.
    - Sections marked with `x-rfb-status: ASSUMED` are inferred from the current RFB and must be validated with stakeholders.
    - Business rules are exposed through `x-business-rules` and validation rules through `x-validation-rules`.
servers:
  - url: /api/v1
    description: API version 1

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Branches
  - name: OrganizationUnits
  - name: Geography
  - name: Drivers
  - name: Vehicles
  - name: Contracts
  - name: Missions
  - name: Approvals
  - name: Dispatch
  - name: Attendance
  - name: Execution
  - name: Finance
  - name: Reports
  - name: Audit
  - name: Integrations
  - name: Lookups

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT token
      operationId: login
      security: []
      x-roles: [Anonymous]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      x-roles: [Anonymous]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me:
    get:
      tags: [Users]
      summary: Get current authenticated user profile
      operationId: getCurrentUser
      x-roles: [Admin, Employee, Manager, Dispatcher, Driver, Finance, ITOperator]
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users:
    get:
      tags: [Users]
      summary: Get users with filtering and pagination
      operationId: getUsers
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: search
          in: query
          schema: { type: string, nullable: true }
        - name: branchId
          in: query
          schema: { type: integer, nullable: true }
        - name: organizationUnitId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: Users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPagedResponseEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      x-roles: [Admin]
      x-validation-rules:
        - Username is required and must be unique.
        - NationalCode must be unique when provided.
        - BranchId and OrganizationUnitId must exist when provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by id
      operationId: getUserById
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      x-roles: [Admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Users]
      summary: Deactivate user
      operationId: deactivateUser
      x-roles: [Admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204': { description: User deactivated }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{userId}/roles:
    post:
      tags: [Users, Roles]
      summary: Assign roles to user
      operationId: assignUserRoles
      x-roles: [Admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesRequest'
      responses:
        '200':
          description: Roles assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /roles:
    get:
      tags: [Roles]
      summary: Get system roles
      operationId: getRoles
      x-roles: [Admin, ITOperator]
      responses:
        '200':
          description: Roles list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponseEnvelope'

  /branches:
    get:
      tags: [Branches]
      summary: Get branches
      operationId: getBranches
      x-roles: [Admin, ITOperator, Dispatcher, Finance]
      parameters:
        - name: search
          in: query
          schema: { type: string, nullable: true }
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchListResponseEnvelope'
    post:
      tags: [Branches]
      summary: Create branch
      operationId: createBranch
      x-roles: [Admin, ITOperator]
      x-business-rules:
        - Branch registration is a prerequisite for driver registration and mission request workflows.
      x-validation-rules:
        - Branch name is required.
        - Branch code must be unique when provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchRequest'
      responses:
        '201':
          description: Branch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseEnvelope'
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /branches/{branchId}:
    get:
      tags: [Branches]
      summary: Get branch by id
      operationId: getBranchById
      x-roles: [Admin, ITOperator, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/BranchId'
      responses:
        '200':
          description: Branch details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Branches]
      summary: Update branch
      operationId: updateBranch
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/BranchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchRequest'
      responses:
        '200':
          description: Branch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Branches]
      summary: Deactivate branch
      operationId: deactivateBranch
      x-roles: [Admin]
      parameters:
        - $ref: '#/components/parameters/BranchId'
      responses:
        '204': { description: Branch deactivated }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /organization-units:
    get:
      tags: [OrganizationUnits]
      summary: Get organization units
      operationId: getOrganizationUnits
      x-roles: [Admin, ITOperator, Manager]
      x-rfb-status: ASSUMED
      parameters:
        - name: parentId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: Organization unit list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUnitListResponseEnvelope'
    post:
      tags: [OrganizationUnits]
      summary: Create organization unit
      operationId: createOrganizationUnit
      x-roles: [Admin, ITOperator]
      x-rfb-status: TODO_EXTERNAL_CHART_ORGANIZATION
      x-todo:
        - Clarify whether organization chart data is managed internally or synchronized from Chargoon.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationUnitRequest'
      responses:
        '201':
          description: Organization unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUnitResponseEnvelope'
        '422': { $ref: '#/components/responses/ValidationError' }

  /provinces:
    get:
      tags: [Geography]
      summary: Get provinces
      operationId: getProvinces
      x-roles: [Admin, ITOperator, Employee, Manager, Dispatcher]
      responses:
        '200':
          description: Province list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvinceListResponseEnvelope'
    post:
      tags: [Geography]
      summary: Create province
      operationId: createProvince
      x-roles: [Admin, ITOperator]
      x-business-rules:
        - Province and city master data must exist before mission requests can select origin and destination.
        - Invalid or duplicate geographic data must be rejected.
      x-validation-rules:
        - Name is required.
        - Code must be unique when provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProvinceRequest'
      responses:
        '201':
          description: Province created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvinceResponseEnvelope'
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /provinces/{provinceId}:
    get:
      tags: [Geography]
      summary: Get province by id
      operationId: getProvinceById
      x-roles: [Admin, ITOperator, Employee, Manager, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/ProvinceId'
      responses:
        '200':
          description: Province details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvinceResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Geography]
      summary: Update province
      operationId: updateProvince
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/ProvinceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProvinceRequest'
      responses:
        '200':
          description: Province updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvinceResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Geography]
      summary: Deactivate province
      operationId: deactivateProvince
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/ProvinceId'
      responses:
        '204': { description: Province deactivated }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /cities:
    get:
      tags: [Geography]
      summary: Get cities
      operationId: getCities
      x-roles: [Admin, ITOperator, Employee, Manager, Dispatcher]
      parameters:
        - name: provinceId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: City list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityListResponseEnvelope'
    post:
      tags: [Geography]
      summary: Create city
      operationId: createCity
      x-roles: [Admin, ITOperator]
      x-validation-rules:
        - ProvinceId is required and must exist.
        - City name is required.
        - Duplicate city name within the same province is not allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCityRequest'
      responses:
        '201':
          description: City created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /cities/{cityId}:
    get:
      tags: [Geography]
      summary: Get city by id
      operationId: getCityById
      x-roles: [Admin, ITOperator, Employee, Manager, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/CityId'
      responses:
        '200':
          description: City details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Geography]
      summary: Update city
      operationId: updateCity
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/CityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCityRequest'
      responses:
        '200':
          description: City updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Geography]
      summary: Deactivate city
      operationId: deactivateCity
      x-roles: [Admin, ITOperator]
      parameters:
        - $ref: '#/components/parameters/CityId'
      responses:
        '204': { description: City deactivated }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /drivers:
    get:
      tags: [Drivers]
      summary: Get drivers
      operationId: getDrivers
      x-roles: [Admin, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: branchId
          in: query
          schema: { type: integer, nullable: true }
        - name: isActive
          in: query
          schema: { type: boolean, nullable: true }
        - name: search
          in: query
          schema: { type: string, nullable: true }
      responses:
        '200':
          description: Driver list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverPagedResponseEnvelope'
    post:
      tags: [Drivers]
      summary: Register driver
      operationId: createDriver
      x-roles: [Admin, Dispatcher]
      x-business-rules:
        - Driver registration must capture identity, contact, license, branch, and insurance information.
        - Missing required identity or license information must reject registration.
      x-validation-rules:
        - FirstName is required.
        - LastName is required.
        - NationalCode is required and must be unique.
        - LicenseNo is required and must be unique.
        - BranchId must exist.
        - Mobile must be valid when provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDriverRequest'
      responses:
        '201':
          description: Driver registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /drivers/{driverId}:
    get:
      tags: [Drivers]
      summary: Get driver by id
      operationId: getDriverById
      x-roles: [Admin, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/DriverId'
      responses:
        '200':
          description: Driver details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Drivers]
      summary: Update driver
      operationId: updateDriver
      x-roles: [Admin, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/DriverId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDriverRequest'
      responses:
        '200':
          description: Driver updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Drivers]
      summary: Deactivate driver
      operationId: deactivateDriver
      x-roles: [Admin, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/DriverId'
      responses:
        '204': { description: Driver deactivated }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /drivers/available:
    get:
      tags: [Drivers, Dispatch]
      summary: Get available drivers for a mission time range
      operationId: getAvailableDrivers
      x-roles: [Admin, Dispatcher]
      x-business-rules:
        - Only active drivers can be assigned.
        - A driver cannot have overlapping active missions.
      parameters:
        - name: startDateTime
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: endDateTime
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: branchId
          in: query
          schema: { type: integer, nullable: true }
      responses:
        '200':
          description: Available driver list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverListResponseEnvelope'
        '422': { $ref: '#/components/responses/ValidationError' }

  /vehicles:
    get:
      tags: [Vehicles]
      summary: Get vehicles
      operationId: getVehicles
      x-roles: [Admin, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/VehicleStatus'
        - name: ownershipType
          in: query
          schema:
            $ref: '#/components/schemas/VehicleOwnershipType'
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclePagedResponseEnvelope'
    post:
      tags: [Vehicles]
      summary: Register vehicle
      operationId: createVehicle
      x-roles: [Admin, Dispatcher]
      x-business-rules:
        - Vehicle registration must include vehicle type, model, color, chassis number, plate number, insurance dates, and ownership type.
        - Expired or missing insurance must trigger warnings and can block assignment.
      x-validation-rules:
        - VehicleType is required.
        - PlateNo is required and must be unique.
        - ChassisNo is required and must be unique.
        - ThirdPartyInsuranceExpireDate is required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVehicleRequest'
      responses:
        '201':
          description: Vehicle registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponseEnvelope'
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /vehicles/{vehicleId}:
    get:
      tags: [Vehicles]
      summary: Get vehicle by id
      operationId: getVehicleById
      x-roles: [Admin, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Vehicles]
      summary: Update vehicle
      operationId: updateVehicle
      x-roles: [Admin, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVehicleRequest'
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponseEnvelope'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Vehicles]
      summary: Deactivate vehicle
      operationId: deactivateVehicle
      x-roles: [Admin, Dispatcher]
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '204': { description: Vehicle deactivated }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /vehicles/available:
    get:
      tags: [Vehicles, Dispatch]
      summary: Get available vehicles for a mission time range
      operationId: getAvailableVehicles
      x-roles: [Admin, Dispatcher]
      x-business-rules:
        - Only active and insured vehicles can be assigned.
        - A vehicle cannot have overlapping active missions.
      parameters:
        - name: startDateTime
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: endDateTime
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Available vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleListResponseEnvelope'
        '422': { $ref: '#/components/responses/ValidationError' }

  /contracts:
    get:
      tags: [Contracts]
      summary: Get contracts
      operationId: getContracts
      x-roles: [Admin, Dispatcher, Finance]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: driverId
          in: query
          schema: { type: integer, nullable: true }
        - name: vehicleId
          in: query
          schema: { type: integer, nullable: true }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ContractStatus'
      responses:
        '200':
          description: Contract list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractPagedResponseEnvelope'
    post:
      tags: [Contracts]
      summary: Create contract
      operationId: createContract
      x-roles: [Admin, Finance]
      x-business-rules:
        - Contract must connect a driver and a vehicle.
