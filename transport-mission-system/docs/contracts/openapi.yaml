              destinationCityId: 20
              startDateTime: '2026-06-20T08:00:00Z'
              endDateTime: '2026-06-20T14:00:00Z'
              missionType: Urban
              travelType: Ground
              reason: Administrative meeting
              description: Mission details
              passengerUserIds: [2, 3]
